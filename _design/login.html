        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md antialiased">
<!-- Atmospheric Background Layers -->
<div class="absolute inset-0 z-0 bg-surface-container-lowest">
<!-- Neural Network Abstract Background Image -->
<div class="absolute inset-0 opacity-20 mix-blend-screen" data-alt="A highly detailed, dark-themed abstract background representing a complex glowing neural network. The scene features delicate, intricate webs of light connecting luminous nodes against a deep, almost pitch-black void. The aesthetic is high-tech, precise, and visionary, perfectly suited for a cutting-edge artificial intelligence platform. The color palette relies heavily on deep midnight blues and subtle electric purple accents that emit a soft, ethereal luminescence." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBGWfcIkSRbtoziOSPhgdPLXIlZped0IZFao5hf3f5wZ0-yMqQkEOcLFqTwxOiUNLjNTqIBha6ktnUFu8S1WpxNRz5p8HjuclhIBVBJugncTbrZaO6t29sARULLzRDsRlFfKfFUu01-GavuwsTYxaR8AQkB0cv1cKUIRcSi9Bo0KRrPsTCbOpXPrq6JWOLzLNHtWDgsexfVxJPn3KloM6iuh9778FKAQVEu8L_5eX7RtdV3S33W3-PAtx4MvaHvaaVBYWrjUUKX5kBU'); background-size: cover; background-position: center;">
</div>
<!-- Subtle Glows -->
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] mix-blend-screen pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] mix-blend-screen pointer-events-none"></div>
</div>
<!-- Main Auth Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-sm md:px-0">
<!-- Glassmorphism Card -->
<div class="bg-surface-container-low/60 backdrop-blur-xl border border-outline-variant/30 rounded-xl shadow-[0_8px_32px_rgba(124,58,237,0.1)] p-8 md:p-10 relative overflow-hidden">
<!-- Top Inner Glow / Rim Light effect -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Header Section -->
<div class="flex flex-col items-center mb-8 text-center">
<div class="h-12 w-12 rounded-lg bg-surface-variant/50 border border-outline-variant/20 flex items-center justify-center mb-4 shadow-inner relative">
<span class="material-symbols-outlined text-primary text-3xl">auto_awesome</span>
<!-- Status Indicator Pulse -->
<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-secondary-container animate-pulse"></span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight mb-2">
                    Synthetic Vision
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Authenticate to access the V3.5 generative engine.
                </p>
</div>
<!-- Auth Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="email">
                        Email Address
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-sm">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant/50 rounded-lg leading-5 bg-surface-variant/50 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 font-label-sm sm:text-sm" id="email" name="email" placeholder="operator@synthetic.ai" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="password">
                            Access Key
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">
                            Forgot Key?
                        </a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-sm">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant/50 rounded-lg leading-5 bg-surface-variant/50 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 font-label-sm sm:text-sm" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-2 flex flex-col gap-4">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-on-primary-container bg-primary-container hover:bg-inverse-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background transition-all duration-200 active:scale-[0.98]" type="submit">
                        Initialize Session
                    </button>
<button class="w-full flex justify-center py-3 px-4 border border-outline-variant rounded-lg shadow-sm text-sm font-medium text-on-surface bg-surface-container/30 hover:bg-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline focus:ring-offset-background transition-all duration-200 active:scale-[0.98]" type="button">
                        Request New Allocation
                    </button>
</div>
</form>
<!-- Decorative Bottom Element -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 flex justify-center items-center gap-2 text-outline-variant text-xs font-label-sm">
<span class="material-symbols-outlined text-sm">shield_locked</span>
<span>End-to-End Encrypted Uplink</span>
</div>
</div>
</main>
